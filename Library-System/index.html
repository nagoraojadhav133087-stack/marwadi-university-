<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏛️ Library Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
</head>
<body>
    <div class="container-fluid">
        <!-- Header -->
        <header class="bg-primary text-white text-center py-4 mb-4">
            <h1><i class="fas fa-book-open me-3"></i>Library Management System</h1>
            <p class="lead mb-0">Books & Members Management</p>
        </header>

        <!-- Stats Cards -->
        <div class="row mb-4">
            <div class="col-md-3">
                <div class="card text-center bg-success text-white">
                    <div class="card-body">
                        <i class="fas fa-book fa-3x mb-3"></i>
                        <h3 id="totalBooks">0</h3>
                        <p>Total Books</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-center bg-info text-white">
                    <div class="card-body">
                        <i class="fas fa-book fa-3x mb-3"></i>
                        <h3 id="availableBooks">0</h3>
                        <p>Available</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-center bg-warning text-white">
                    <div class="card-body">
                        <i class="fas fa-users fa-3x mb-3"></i>
                        <h3 id="totalMembers">0</h3>
                        <p>Total Members</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-center bg-danger text-white">
                    <div class="card-body">
                        <i class="fas fa-handshake fa-3x mb-3"></i>
                        <h3 id="borrowedBooks">0</h3>
                        <p>Borrowed</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Navigation Tabs -->
        <ul class="nav nav-tabs mb-4" id="mainTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="books-tab" data-bs-toggle="tab" data-bs-target="#books" type="button">
                    <i class="fas fa-book me-1"></i>Books
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="members-tab" data-bs-toggle="tab" data-bs-target="#members" type="button">
                    <i class="fas fa-users me-1"></i>Members
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="borrow-tab" data-bs-toggle="tab" data-bs-target="#borrow" type="button">
                    <i class="fas fa-handshake me-1"></i>Borrow/Return
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="search-tab" data-bs-toggle="tab" data-bs-target="#search" type="button">
                    <i class="fas fa-search me-1"></i>Search
                </button>
            </li>
        </ul>

        <!-- Tab Content -->
        <div class="tab-content" id="mainTabContent">
            <!-- Books Tab -->
            <div class="tab-pane fade show active" id="books" role="tabpanel">
                <div class="row mb-3">
                    <div class="col-md-6">
                        <button class="btn btn-success" onclick="library.showAddBookModal()">
                            <i class="fas fa-plus me-2"></i>Add New Book
                        </button>
                    </div>
                    <div class="col-md-3">
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" id="availableOnly" onchange="library.renderBooks()">
                            <label class="form-check-label" for="availableOnly">Available Only</label>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <select class="form-select" id="booksPerPage" onchange="library.changePerPage()">
                            <option value="10">10 per page</option>
                            <option value="25">25 per page</option>
                            <option value="50">50 per page</option>
                        </select>
                    </div>
                </div>
                <div class="table-responsive">
                    <table class="table table-hover" id="booksTable">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>Title</th>
                                <th>Author</th>
                                <th>Genre</th>
                                <th>ISBN</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
                <nav id="booksPagination" class="mt-3"></nav>
            </div>

            <!-- Members Tab -->
            <div class="tab-pane fade" id="members" role="tabpanel">
                <div class="row mb-3">
                    <div class="col-md-4">
                        <button class="btn btn-primary w-100" onclick="library.showAddMemberModal()">
                            <i class="fas fa-user-plus me-2"></i>Add Member
                        </button>
                    </div>
                </div>
                <div class="table-responsive">
                    <table class="table table-hover" id="membersTable">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Phone</th>
                                <th>Books Borrowed</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>

            <!-- Borrow/Return Tab -->
            <div class="tab-pane fade" id="borrow" role="tabpanel">
                <div class="row">
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-header bg-info text-white">
                                <h5><i class="fas fa-handshake me-2"></i>Borrow Book</h5>
                            </div>
                            <div class="card-body">
                                <div class="mb-3">
                                    <label class="form-label">Member ID</label>
                                    <input type="number" class="form-control" id="borrowMemberId" placeholder="e.g., 1">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Book ID</label>
                                    <input type="number" class="form-control" id="borrowBookId" placeholder="e.g., 1">
                                </div>
                                <button class="btn btn-success w-100" onclick="library.borrowBookFromUI()">
                                    <i class="fas fa-book me-2"></i>Borrow Book
                                </button>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-header bg-warning text-white">
                                <h5><i class="fas fa-undo me-2"></i>Return Book</h5>
                            </div>
                            <div class="card-body">
                                <div class="mb-3">
                                    <label class="form-label">Member ID</label>
                                    <input type="number" class="form-control" id="returnMemberId" placeholder="e.g., 1">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Book ID</label>
                                    <input type="number" class="form-control" id="returnBookId" placeholder="e.g., 1">
                                </div>
                                <button class="btn btn-warning w-100 text-white" onclick="library.returnBookFromUI()">
                                    <i class="fas fa-book me-2"></i>Return Book
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Search Tab -->
            <div class="tab-pane fade" id="search" role="tabpanel">
                <div class="row">
                    <div class="col-md-8 mx-auto">
                        <div class="input-group mb-4">
                            <span class="input-group-text"><i class="fas fa-search"></i></span>
                            <input type="text" class="form-control" id="searchInput" placeholder="Search by title, author, or genre..." onkeyup="library.searchBooks()">
                            <button class="btn btn-outline-secondary" onclick="library.clearSearch()">Clear</button>
                        </div>
                        <div id="searchResults" class="row"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Book Modal -->
    <div class="modal fade" id="addBookModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-success text-white">
                    <h5 class="modal-title"><i class="fas fa-plus me-2"></i>Add New Book</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Title</label>
                        <input type="text" class="form-control" id="bookTitle" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Author</label>
                        <input type="text" class="form-control" id="bookAuthor" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">ISBN</label>
                        <input type="text" class="form-control" id="bookISBN" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Genre</label>
                        <select class="form-select" id="bookGenre">
                            <option value="Fiction">Fiction</option>
                            <option value="Fantasy">Fantasy</option>
                            <option value="Sci-Fi">Sci-Fi</option>
                            <option value="Thriller">Thriller</option>
                            <option value="Self-Help">Self-Help</option>
                            <option value="Business">Business</option>
                            <option value="Non-Fiction">Non-Fiction</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Copies</label>
                        <input type="number" class="form-control" id="bookCopies" value="1" min="1">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-success" onclick="library.addBookFromModal()">Add Book</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Member Modal -->
    <div class="modal fade" id="addMemberModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title"><i class="fas fa-user-plus me-2"></i>Add New Member</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Name</label>
                        <input type="text" class="form-control" id="memberName" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" id="memberEmail" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Phone</label>
                        <input type="tel" class="form-control" id="memberPhone" required>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="library.addMemberFromModal()">Add Member</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="liveToast" class="toast" role="alert">
            <div class="toast-header">
                <strong class="me-auto">Library System</strong>
                <button type="button" class="btn-close" data-bs-dismiss="toast"></button>
            </div>
            <div class="toast-body" id="toastMessage"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
